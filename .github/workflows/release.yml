name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  python:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install -U pip
          python -m pip install build

      - name: Build package
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: win-x64
          - os: ubuntu-latest
            name: linux-x64
          - os: macos-latest
            name: macos-arm64
          - os: macos-15-intel
            name: macos-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libgtk-3-0 libwebkit2gtk-4.1-0 libnotify-bin

      - name: Install dependencies
        run: bun install

      - name: Type check desktop app
        run: bun run desktop:typecheck

      - name: Build desktop app
        run: bun run desktop:build:stable

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.name }}
          path: artifacts/*

  publish:
    needs: [python, desktop]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
